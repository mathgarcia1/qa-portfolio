{% extends "base.html" %}
{% block content %}
<h2>Usuarios</h2>
<a href="/admin/usuarios/novo">Novo</a>
<table class="table">
    <thead><tr><th>Username</th><th>Ações</th></tr></thead>
    <tbody>
        {% for user in users %}
        <tr>
            <td>{{ user.username }}</td>
            <td><a href="/admin/usuarios/{{ loop.index }}/editar">Editar</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
